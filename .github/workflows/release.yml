name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: ./build.sh

      - name: Package
        run: |
          cd build
          zip -r --symlinks "Textual-${{ github.ref_name }}.zip" Textual.app

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "build/Textual-${{ github.ref_name }}.zip"
        env:
          GH_TOKEN: ${{ github.token }}
